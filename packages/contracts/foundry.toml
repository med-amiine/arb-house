[profile.default]
src = "src"
out = "out"
libs = ["lib"]

# Solc version
solc = "0.8.20"

# Optimizer
optimizer = true
optimizer_runs = 200

# Testing
fuzz_runs = 1000
fuzz_max_test_rejects = 100000

# Formatter
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "attributes_first"
quote_style = "double"
number_underscore = "preserve"

[profile.ci]
fuzz_runs = 10000
verbosity = 4

[etherscan]
arbitrum = { key = "${ARBISCAN_API_KEY}" }
arbitrum-sepolia = { key = "${ARBISCAN_API_KEY}", url = "https://api-sepolia.arbiscan.io/api" }

[rpc_endpoints]
arbitrum = "${ARB_RPC_URL}"
arbitrum-sepolia = "${ARB_SEPOLIA_RPC_URL}"
