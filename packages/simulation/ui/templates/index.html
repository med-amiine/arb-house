<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault Simulation UI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0A0B0D;
            min-height: 100vh;
            padding: 20px;
            color: #E8F0E8;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: #141517;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            border: 1px solid #2A2B2F;
        }

        .header h1 {
            color: #059669;
            margin-bottom: 10px;
        }

        .header .subtitle {
            color: #6B7280;
            font-size: 14px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #059669;
            color: white;
        }

        .btn-primary:hover {
            background: #047857;
        }

        .btn-success {
            background: #059669;
            color: white;
        }

        .btn-success:hover {
            background: #047857;
        }

        .btn-danger {
            background: #DC2626;
            color: white;
        }

        .btn-danger:hover {
            background: #B91C1C;
        }

        .btn-secondary {
            background: #4B5563;
            color: white;
        }

        .btn-secondary:hover {
            background: #374151;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: #141517;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            border: 1px solid #2A2B2F;
        }

        .card h2 {
            color: #059669;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #2A2B2F;
        }

        .metric:last-child {
            border-bottom: none;
        }

        .metric-label {
            color: #6b7280;
            font-size: 14px;
        }

        .metric-value {
            color: #111827;
            font-weight: 600;
            font-size: 16px;
        }

        .metric-value.highlight {
            color: #10b981;
            font-size: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #E8F0E8;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #2A2B2F;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
            background: #141517;
            color: #E8F0E8;
        }

        .form-group input:focus {
            outline: none;
            border-color: #059669;
        }

        .chart-container {
            background: #141517;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            height: 400px;
            border: 1px solid #2A2B2F;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-indicator.running {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }

        .status-indicator.stopped {
            background: #ef4444;
        }

        .user-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .user-item {
            padding: 15px;
            background: #f9fafb;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .user-item h3 {
            color: #111827;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .transaction-item {
            padding: 10px;
            background: #f9fafb;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .transaction-item.deposit {
            border-left: 4px solid #10b981;
        }

        .transaction-item.withdraw {
            border-left: 4px solid #ef4444;
        }

        .agent-item {
            padding: 12px;
            background: #f0f9ff;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #6b7280;
        }

        .error {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .success {
            background: #f0fdf4;
            color: #059669;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏦 Vault Simulation System</h1>
            <div class="subtitle">
                Share-based vault with 3 agents generating 7% yield every 5 minutes
            </div>
            <div class="controls">
                <button class="btn btn-success" onclick="startSimulation()">▶ Start</button>
                <button class="btn btn-danger" onclick="stopSimulation()">⏸ Stop</button>
                <button class="btn btn-secondary" onclick="resetSimulation()">🔄 Reset</button>
                <button class="btn btn-primary" onclick="runDemo()" style="background: #f59e0b; border-color: #f59e0b;">🎬 Run Demo</button>
                <div style="margin-left: auto; display: flex; align-items: center;">
                    <span class="status-indicator" id="statusIndicator"></span>
                    <span id="statusText">Stopped</span>
                </div>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>📊 Vault Metrics</h2>
                <div id="metrics">
                    <div class="loading">Loading...</div>
                </div>
            </div>

            <div class="card">
                <h2>💰 User Actions</h2>
                <div id="userActions">
                    <div class="form-group">
                        <label>User Address</label>
                        <input type="text" id="userAddress" placeholder="0xUserA" value="0xUserA">
                    </div>
                    <div class="form-group">
                        <label>Amount (for deposit)</label>
                        <input type="number" id="depositAmount" placeholder="100" value="100" step="0.01">
                    </div>
                    <button class="btn btn-primary" onclick="deposit()" style="width: 100%; margin-bottom: 10px;">
                        💵 Deposit
                    </button>
                    <div class="form-group">
                        <label>Shares to Withdraw (or "all")</label>
                        <input type="text" id="withdrawShares" placeholder="all" value="all">
                    </div>
                    <button class="btn btn-primary" onclick="withdraw()" style="width: 100%;">
                        💸 Withdraw
                    </button>
                    <div id="actionMessage"></div>
                </div>
            </div>

            <div class="card">
                <h2>🤖 Agents</h2>
                <div id="agents">
                    <div class="loading">Loading...</div>
                </div>
            </div>
        </div>

        <div class="chart-container">
            <h2 style="margin-bottom: 20px; color: #667eea;">📈 Share Price Over Time</h2>
            <canvas id="sharePriceChart"></canvas>
        </div>

        <div class="grid">
            <div class="card">
                <h2>👥 Users</h2>
                <div id="users" class="user-list">
                    <div class="loading">Loading...</div>
                </div>
            </div>

            <div class="card">
                <h2>📝 Recent Transactions</h2>
                <div id="transactions" style="max-height: 400px; overflow-y: auto;">
                    <div class="loading">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sharePriceChart = null;
        let updateInterval = null;

        // Initialize chart
        function initChart() {
            const ctx = document.getElementById('sharePriceChart').getContext('2d');
            sharePriceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Share Price',
                        data: [],
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false
                        }
                    }
                }
            });
        }

        // Update chart with history
        function updateChart() {
            fetch('/api/history')
                .then(res => res.json())
                .then(data => {
                    if (data.length === 0) return;
                    
                    const labels = data.map(d => {
                        const date = new Date(d.timestamp);
                        return date.toLocaleTimeString();
                    });
                    const prices = data.map(d => d.share_price);
                    
                    sharePriceChart.data.labels = labels;
                    sharePriceChart.data.datasets[0].data = prices;
                    sharePriceChart.update('none');
                })
                .catch(err => console.error('Error updating chart:', err));
        }

        // Update all UI elements
        function updateUI() {
            fetch('/api/status')
                .then(res => res.json())
                .then(data => {
                    // Update metrics
                    const metricsHtml = `
                        <div class="metric">
                            <span class="metric-label">Total Assets</span>
                            <span class="metric-value">${parseFloat(data.metrics.total_assets).toFixed(2)}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Total Shares</span>
                            <span class="metric-value">${parseFloat(data.metrics.total_shares).toFixed(2)}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Share Price</span>
                            <span class="metric-value highlight">${data.metrics.share_price_formatted.toFixed(6)}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Users</span>
                            <span class="metric-value">${data.metrics.num_users}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Transactions</span>
                            <span class="metric-value">${data.metrics.num_transactions}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Uptime</span>
                            <span class="metric-value">${formatUptime(data.uptime_seconds)}</span>
                        </div>
                    `;
                    document.getElementById('metrics').innerHTML = metricsHtml;

                    // Update status
                    const indicator = document.getElementById('statusIndicator');
                    const statusText = document.getElementById('statusText');
                    if (data.simulation_running) {
                        indicator.className = 'status-indicator running';
                        statusText.textContent = 'Running';
                    } else {
                        indicator.className = 'status-indicator stopped';
                        statusText.textContent = 'Stopped';
                    }

                    // Update agents
                    const agentsHtml = data.agents.map(agent => `
                        <div class="agent-item">
                            <span><strong>${agent.name}</strong></span>
                            <span class="metric-value">${parseFloat(agent.assets).toFixed(2)}</span>
                        </div>
                    `).join('');
                    document.getElementById('agents').innerHTML = agentsHtml || '<div class="loading">No agents</div>';

                    // Update users
                    const usersHtml = data.users.map(user => `
                        <div class="user-item">
                            <h3>${user.address}</h3>
                            <div class="metric">
                                <span class="metric-label">Shares</span>
                                <span class="metric-value">${parseFloat(user.shares).toFixed(2)}</span>
                            </div>
                            <div class="metric">
                                <span class="metric-label">Claimable Assets</span>
                                <span class="metric-value">${parseFloat(user.claimable_assets).toFixed(2)}</span>
                            </div>
                            <div class="metric">
                                <span class="metric-label">Net Gain</span>
                                <span class="metric-value" style="color: ${parseFloat(user.net_gain) >= 0 ? '#10b981' : '#ef4444'}">
                                    ${parseFloat(user.net_gain).toFixed(2)}
                                </span>
                            </div>
                        </div>
                    `).join('');
                    document.getElementById('users').innerHTML = usersHtml || '<div class="loading">No users</div>';

                    // Update transactions
                    fetch('/api/transactions')
                        .then(res => res.json())
                        .then(txs => {
                            const txsHtml = txs.slice(0, 10).map(tx => `
                                <div class="transaction-item ${tx.type}">
                                    <strong>${tx.type.toUpperCase()}</strong> - ${tx.user}<br>
                                    Amount: ${parseFloat(tx.amount).toFixed(2)} | 
                                    Shares: ${parseFloat(tx.shares).toFixed(2)}<br>
                                    <small>${new Date(tx.timestamp).toLocaleString()}</small>
                                </div>
                            `).join('');
                            document.getElementById('transactions').innerHTML = txsHtml || '<div class="loading">No transactions</div>';
                        });
                })
                .catch(err => console.error('Error updating UI:', err));
        }

        function formatUptime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}m ${secs}s`;
        }

        // User actions
        function deposit() {
            const user = document.getElementById('userAddress').value || '0xUserA';
            const amount = parseFloat(document.getElementById('depositAmount').value);
            
            if (!amount || amount <= 0) {
                showMessage('Please enter a valid amount', 'error');
                return;
            }

            fetch('/api/deposit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user, amount})
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    showMessage(data.error, 'error');
                } else {
                    showMessage(`Deposited ${amount} tokens, received ${parseFloat(data.shares).toFixed(2)} shares`, 'success');
                    updateUI();
                    updateChart();
                }
            })
            .catch(err => showMessage('Error: ' + err.message, 'error'));
        }

        function withdraw() {
            const user = document.getElementById('userAddress').value || '0xUserA';
            const shares = document.getElementById('withdrawShares').value;

            fetch('/api/withdraw', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user, shares})
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    showMessage(data.error, 'error');
                } else {
                    showMessage(`Withdrew ${parseFloat(data.shares).toFixed(2)} shares, received ${parseFloat(data.assets).toFixed(2)} tokens`, 'success');
                    updateUI();
                    updateChart();
                }
            })
            .catch(err => showMessage('Error: ' + err.message, 'error'));
        }

        function showMessage(message, type) {
            const div = document.getElementById('actionMessage');
            div.className = type;
            div.textContent = message;
            setTimeout(() => {
                div.textContent = '';
                div.className = '';
            }, 5000);
        }

        function startSimulation() {
            fetch('/api/start', {method: 'POST'})
                .then(res => res.json())
                .then(data => {
                    showMessage(data.message || 'Simulation started', 'success');
                    updateUI();
                });
        }

        function stopSimulation() {
            fetch('/api/stop', {method: 'POST'})
                .then(res => res.json())
                .then(data => {
                    showMessage(data.message || 'Simulation stopped', 'success');
                    updateUI();
                });
        }

        function resetSimulation() {
            if (confirm('Are you sure you want to reset the simulation? All data will be lost.')) {
                fetch('/api/reset', {method: 'POST'})
                    .then(res => res.json())
                    .then(data => {
                        showMessage(data.message || 'Simulation reset', 'success');
                        updateUI();
                        updateChart();
                    });
            }
        }

        function runDemo() {
            if (confirm('This will reset the simulation and run an automated demo. Continue?')) {
                fetch('/api/demo', {method: 'POST'})
                    .then(res => res.json())
                    .then(data => {
                        if (data.error) {
                            showMessage(data.error, 'error');
                        } else {
                            showMessage('🎬 Demo started! Watch as deposits and yields happen automatically...', 'success');
                            // Update more frequently during demo
                            clearInterval(updateInterval);
                            updateInterval = setInterval(() => {
                                updateUI();
                                updateChart();
                            }, 1000);
                            // Reset to normal after 60 seconds
                            setTimeout(() => {
                                clearInterval(updateInterval);
                                updateInterval = setInterval(() => {
                                    updateUI();
                                    updateChart();
                                }, 2000);
                            }, 60000);
                        }
                    })
                    .catch(err => showMessage('Error: ' + err.message, 'error'));
            }
        }

        // Initialize
        initChart();
        updateUI();
        updateChart();

        // Auto-update every 2 seconds
        updateInterval = setInterval(() => {
            updateUI();
            updateChart();
        }, 2000);
    </script>
</body>
</html>
