name: Deploy to Railway

on:
  push:
    branches: [main]
    paths:
      - 'packages/keeper/**'
      - '.github/workflows/deploy-railway.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: |
          cd packages/keeper
          railway up --token=${{ secrets.RAILWAYS_TOKEN }}
