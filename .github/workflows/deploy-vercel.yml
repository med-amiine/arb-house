name: Deploy to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'packages/frontend/**'
      - '.github/workflows/deploy-vercel.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link Vercel Project
        working-directory: ./packages/frontend
        run: |
          mkdir -p .vercel
          echo '{"orgId":"${{ vars.VERCEL_ORG_ID }}","projectId":"${{ vars.VERCEL_PROJECT_ID }}"}' > .vercel/project.json

      - name: Pull Vercel Environment Information
        working-directory: ./packages/frontend
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        working-directory: ./packages/frontend
        env:
          NEXT_PUBLIC_VAULT_ADDRESS: ${{ vars.USDC_ADDRESS }}
          NEXT_PUBLIC_USDC_ADDRESS: ${{ vars.USDC_ADDRESS }}
          NEXT_PUBLIC_CHAIN_ID: 421614
          NEXT_PUBLIC_RPC_URL: https://arbitrum-sepolia.drpc.org
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ vars.WALLETCONNECT_PROJECT_ID }}
        run: |
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        working-directory: ./packages/frontend
        run: |
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
