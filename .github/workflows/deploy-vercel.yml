name: Deploy to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'packages/frontend/**'
      - '.github/workflows/deploy-vercel.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd packages/frontend
          npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL }}
        run: |
          cd packages/frontend
          vercel --token "$VERCEL_TOKEN" --yes --prod \
            --env NEXT_PUBLIC_VAULT_ADDRESS=${{ vars.VAULT_ADDRESS || '0x910a7b063021eC417227F3Cb7f0178f28bc0BA4E' }} \
            --env NEXT_PUBLIC_USDC_ADDRESS=${{ vars.USDC_ADDRESS || '0xA526233CdaAd2Ed586908E5D9B3446e0A6F262E5' }} \
            --env NEXT_PUBLIC_CHAIN_ID=421614 \
            --env NEXT_PUBLIC_RPC_URL=https://arbitrum-sepolia.drpc.org \
            --env NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${{ vars.WALLETCONNECT_PROJECT_ID || '7efde86d6f5ee30bddcb4c0dc4173daf' }}
